<section class="featured" id="featured">
  <h3>Featured Products</h3>
  <div class="product-grid">
    <script>
      const products = [
        { img: "PH6.jpg", name: "32L Microwave", price: "N$1,250", condition: "Excellent Condition" },
        { img: "PH10a.jpg", name: "2x Event Table Combo", price: "N$2,150 for Both", condition: "Pre-Loved" }
      ];

      document.write(products.map((product, i) => `
        <div class="product-card" id="item${i+1}">
          <img src="${product.img}" alt="${product.name}" onclick="enlargeImage(this)" />
          <h4>${product.name}</h4>
          <p class="price">${product.price}</p>
          <span class="condition faded-badge">${product.condition}</span>
          <p class="status">In Stock</p>
          <div class="like-section">
            <i class="fas fa-heart" onclick="toggleLike(this)"></i> <span class="like-count">0</span>
          </div>
          <a href="https://wa.me/264817859603" target="_blank" class="whatsapp-button">
            <i class="fab fa-whatsapp"></i> WhatsApp Seller
          </a>
        </div>
      `).join(''));
    </script>
  </div>
</section>
