<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Swiper demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1">
  <link rel="stylesheet" href="swiper/swiper-bundle.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="swiper-container">
    <div class="swiper-wrapper">
      <div class="swiper-slide">
        <div class="img"><img src="PH3a.jpeg" alt="PH3a"></div>
        <div class="content">
          <h3>Gambar 1</h3>
        </div>
      </div>
      <div class="swiper-slide">
        <div class="img"><img src="PH3b.jpeg" alt="PH3b"></div>
        <div class="content">
          <h3>Gambar 2</h3>
        </div>
      </div>
      <div class="swiper-slide">
        <div class="img"><img src="PH3c.jpeg" alt="PH3c"></div>
        <div class="content">
          <h3>Gambar 3</h3>
        </div>
      </div>
      <div class="swiper-slide">
        <div class="img"><img src="PH3a.jpeg" alt="PH3a"></div>
        <div class="content">
          <h3>Gambar 4</h3>
        </div>
      </div>
      <div class="swiper-slide">
        <div class="img"><img src="PH3b.jpeg" alt="PH3b"></div>
        <div class="content">
          <h3>Gambar 5</h3>
        </div>
      </div>
    </div>
    <div class="swiper-pagination"></div>
  </div>
  <script src="swiper/swiper-bundle.min.js"></script> 
  <script>


    var swiper = new Swiper('.swiper-container', {
      effect: 'coverflow',
      grabCursor: true,
      centeredSlides: true,
      slidesPerView: 'auto',
      coverflowEffect: {
        rotate: 20,
        stretch: 0,
        depth: 500,
        modifier: 1,
        slideShadows: true,
      },
      pagination: {
        el: '.swiper-pagination',
      },
    });
  </script>
</body>
</html>
