<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KABOOM CRASH - Products</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <!-- PRODUCT SECTION ONLY -->
  <section class="featured" id="featured">
    <h3>Featured Products</h3>
    <div class="product-grid"></div>

    <!-- PRODUCT DISPLAY SCRIPT -->
    <script>
      const products = [
        { img: "PH1.jpg", name: "White Office Chair", price: "N$850", condition: "Excellent Condition" },
        { img: ["PH10a.jpg", "PH10b.jpg"], name: "2x Event Table Combo", price: "N$2,150 for Both", condition: "Pre-Loved" },
      ];

      const grid = document.querySelector(".product-grid");

      products.forEach(product => {
        const productDiv = document.createElement("div");
        productDiv.className = "product";

        const imageList = Array.isArray(product.img) ? product.img : [product.img];
        let currentIndex = 0;

        const imageContainer = document.createElement("div");
        imageContainer.className = "carousel";

        let imgElement = document.createElement("img");
        imgElement.src = imageList[currentIndex];
        imgElement.alt = product.name;
        imgElement.style.cursor = "pointer";
        imgElement.onclick = () => enlargeImage(imgElement);

        imageContainer.appendChild(imgElement);
        productDiv.appendChild(imageContainer);

        let startX = 0;
        imgElement.addEventListener("touchstart", e => {
          startX = e.touches[0].clientX;
        }, { passive: true });

        imgElement.addEventListener("touchend", e => {
          const endX = e.changedTouches[0].clientX;
          const diff = endX - startX;

          if (Math.abs(diff) > 30 && imageList.length > 1) {
            currentIndex = (diff < 0)
              ? (currentIndex + 1) % imageList.length
              : (currentIndex - 1 + imageList.length) % imageList.length;

            const newImg = document.createElement("img");
            newImg.src = imageList[currentIndex];
            newImg.alt = product.name;
            newImg.style.cursor = "pointer";
            newImg.onclick = () => enlargeImage(newImg);

            newImg.addEventListener("touchstart", e => {
              startX = e.touches[0].clientX;
            }, { passive: true });

            newImg.addEventListener("touchend", e => {
              const endX = e.changedTouches[0].clientX;
              const diff = endX - startX;

              if (Math.abs(diff) > 30 && imageList.length > 1) {
                currentIndex = (diff < 0)
                  ? (currentIndex + 1) % imageList.length
                  : (currentIndex - 1 + imageList.length) % imageList.length;
                newImg.src = imageList[currentIndex];
              }
            }, { passive: true });

            imageContainer.replaceChild(newImg, imgElement);
            imgElement = newImg;
          }
        }, { passive: true });

        const name = document.createElement("h4");
        name.textContent = product.name;

        const price = document.createElement("p");
        price.textContent = product.price;

        const condition = document.createElement("p");
        condition.textContent = product.condition;

        productDiv.appendChild(name);
        productDiv.appendChild(price);
        productDiv.appendChild(condition);

        grid.appendChild(productDiv);
      });

      function enlargeImage(img) {
        window.open(img.src, '_blank');
      }
    </script>
  </section>
</body>
</html>
