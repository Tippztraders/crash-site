<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Image Slider + Fullscreen Zoom</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; }
    .slider { position: relative; width: 100%; max-width: 600px; margin: 2em auto; overflow: hidden; }
    .slides { display: flex; transition: transform 0.4s ease; touch-action: pan-y; }
    .slides img { width: 100%; display: block; cursor: pointer; }
    .fullscreen {
      display: none;
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      justify-content: center; align-items: center;
      overflow: hidden;
    }
    .fullscreen img { max-width: 100%; max-height: 100%; cursor: grab; }
  </style>
</head>
<body>

  <!-- Main slider -->
  <div class="slider" id="mainSlider">
    <div class="slides">
      <img src="image1.jpg" alt="Slide 1">
      <img src="image2.jpg" alt="Slide 2">
      <img src="image3.jpg" alt="Slide 3">
    </div>
  </div>

  <!-- Fullscreen overlay -->
  <div class="fullscreen" id="fsOverlay">
    <div class="slides">
      <img src="" alt="FS Slide">
      <img src="" alt="FS Slide">
      <img src="" alt="FS Slide">
    </div>
  </div>

  <script>
    // Shared logic for both views
    function initSlider(container, allowTap) {
      const slides = container.querySelector('.slides');
      const imgs = slides.querySelectorAll('img');
      let current = 0, startX = 0, deltaX = 0, isSwiping = false, isTap = false;

      function update() {
        slides.style.transform = `translateX(-${current * container.clientWidth}px)`;
      }

      slides.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        isSwiping = true; isTap = true;
      });

      slides.addEventListener('touchmove', e => {
        if (!isSwiping) return;
        deltaX = e.touches[0].clientX - startX;
        if (Math.abs(deltaX) > 10) isTap = false;
        slides.style.transform = `translateX(${deltaX - current * container.clientWidth}px)`;
      });

      slides.addEventListener('touchend', e => {
        isSwiping = false;
        if (isTap && allowTap) {
          const tapImg = e.target.closest('img');
          if (tapImg) openFullscreen(Array.from(imgs).indexOf(tapImg));
          return;
        }
        if (Math.abs(deltaX) > container.clientWidth / 3) {
          current += deltaX < 0 ? 1 : -1;
          current = (current + imgs.length) % imgs.length;
        }
        update();
      });

      window.addEventListener('resize', update);
    }

    // Set up main slider (no tap action)
    initSlider(document.getElementById('mainSlider'), true);

    // Fullscreen logic
    const fs = document.getElementById('fsOverlay');
    const fsSlides = fs.querySelector('.slides');
    const fsImgs = fsSlides.querySelectorAll('img');
    let fsCurrent = 0;

    function openFullscreen(idx) {
      document.querySelectorAll('#mainSlider .slides img').forEach((img, i) => {
        fsImgs[i].src = img.src;
      });
      fsCurrent = idx;
      fs.style.display = 'flex';
      fsSlides.style.transform = `translateX(-${fsCurrent * fs.clientWidth}px)`;
      initSlider(fs, false); // no tap inside fullscreen
    }

    // Exit fullscreen on outside tap
    fs.addEventListener('click', e => {
      if (e.target === fs) fs.style.display = 'none';
    });
  </script>

</body>
</html>
