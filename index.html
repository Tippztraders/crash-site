<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Carousel</title>
<style>
  .carousel-container {
    width: 100%;
    overflow: hidden;
  }
  .carousel-slide {
    display: flex;
    transition: transform 0.5s ease-in-out;
  }
  .carousel-item {
    min-width: 100%;
    box-sizing: border-box;
  }
  .carousel-item img {
    width: 100%;
    display: block; /* Prevents extra space below the image */
  }
</style>
</head>
<body>

  <div class="carousel-container">
    <div class="carousel-slide">
      <div class="carousel-item"><img src="image1.jpg" alt="Image 1"></div>
      <div class="carousel-item"><img src="image2.jpg" alt="Image 2"></div>
      <div class="carousel-item"><img src="image3.jpg" alt="Image 3"></div>
      <div class="carousel-item"><img src="image4.jpg" alt="Image 4"></div>
    </div>
  </div>

  <script>
    // Basic JavaScript for simple sliding (can be improved with a library)
    const carouselSlide = document.querySelector('.carousel-slide');
    const carouselItems = document.querySelectorAll('.carousel-item');
    const totalItems = carouselItems.length;
    let currentIndex = 0;
    const itemWidth = carouselItems[0].offsetWidth; // Get the width of one item

    function goToSlide(index) {
      if (index < 0) {
        index = totalItems - 1;
      } else if (index >= totalItems) {
        index = 0;
      }
      currentIndex = index;
      carouselSlide.style.transform = `translateX(-${currentIndex * itemWidth}px)`;
    }

    function nextSlide() {
      goToSlide(currentIndex + 1);
    }

     // Add touch event listeners for mobile swipe
    let startX = 0;
    let currentX = 0;
    let isSwiping = false;

    carouselSlide.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
      isSwiping = true;
    });

    carouselSlide.addEventListener('touchmove', (e) => {
      if (!isSwiping) return;
      currentX = e.touches[0].clientX;
      const diff = startX - currentX;
       // Adjust the transform based on the swipe distance
      carouselSlide.style.transform = `translateX(-${currentIndex * itemWidth + diff}px)`;
    });

    carouselSlide.addEventListener('touchend', () => {
      if (!isSwiping) return;
      isSwiping = false;
      const diff = startX - currentX;
      if (Math.abs(diff) > itemWidth / 3) { // If swiped more than a third of the width
        if (diff > 0) {
          nextSlide();
        } else {
           goToSlide(currentIndex - 1);
        }
      } else {
        // Reset to the current slide if not swiped enough
        carouselSlide.style.transform = `translateX(-${currentIndex * itemWidth}px)`;
      }
    });

    // Automatically advance the slide (optional)
    setInterval(nextSlide, 3000); // Change image every 3 seconds
  </script>
</body>
</html>
